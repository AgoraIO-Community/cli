name: Homebrew Tap Update

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-tap:
    name: Update Homebrew tap formula/cask
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    env:
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}

    steps:
      - name: Check out CLI repository
        uses: actions/checkout@v4

      - name: Validate tap settings
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TAP_REPO:-}" ]]; then
            echo "Missing repository variable HOMEBREW_TAP_REPO (example: agora/homebrew-tap)."
            exit 1
          fi
          if [[ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]]; then
            echo "Missing secret HOMEBREW_TAP_TOKEN."
            exit 1
          fi

      - name: Download release checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          curl -fsSL \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/checksums.txt" \
            -o checksums.txt
          ./scripts/homebrew/generate.sh "${version}" checksums.txt

      - name: Check out tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Copy generated Homebrew files into tap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tap/Formula tap/Casks
          cp packaging/homebrew/generated/Formula/agora.rb tap/Formula/agora.rb
          cp packaging/homebrew/generated/Casks/agora-cli-go.rb tap/Casks/agora-cli-go.rb

      - name: Create pull request in tap repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          branch: chore/homebrew-agora-${{ github.event.release.tag_name }}
          commit-message: "chore(homebrew): update Agora CLI to ${{ github.event.release.tag_name }}"
          title: "chore(homebrew): update Agora CLI to ${{ github.event.release.tag_name }}"
          body: |
            Updates Homebrew formula and cask for `${{ github.event.release.tag_name }}`.
          labels: |
            release
            homebrew

