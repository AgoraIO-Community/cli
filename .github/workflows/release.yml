name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          artifact_base="agora-cli-go_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          bin_name="agora"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            bin_name="agora.exe"
          fi

          mkdir -p dist
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -trimpath -o "dist/${bin_name}" .

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -q "${artifact_base}.zip" "${bin_name}"
              rm -f "${bin_name}"
            )
          else
            tar -C dist -czf "dist/${artifact_base}.tar.gz" "${bin_name}"
            rm -f "dist/${bin_name}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
