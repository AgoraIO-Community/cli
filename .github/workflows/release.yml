name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          artifact_base="agora-cli-go_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          bin_name="agora"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            bin_name="agora.exe"
          fi

          mkdir -p dist
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -trimpath -o "dist/${bin_name}" .

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -q "${artifact_base}.zip" "${bin_name}"
              rm -f "${bin_name}"
            )
          else
            tar -C dist -czf "dist/${artifact_base}.tar.gz" "${bin_name}"
            rm -f "dist/${bin_name}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*

  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          publish_platform() {
            local goos="$1" goarch="$2" npm_pkg="$3" bin_name="$4" archive_ext="$5"
            local pkg_dir="packaging/npm/@agoraio/${npm_pkg}"
            local archive="agora-cli-go_${GITHUB_REF_NAME}_${goos}_${goarch}.${archive_ext}"

            if [ "$archive_ext" = "zip" ]; then
              unzip -p "dist/${archive}" "${bin_name}" > "${pkg_dir}/bin/${bin_name}"
            else
              tar -xzf "dist/${archive}" -O "${bin_name}" > "${pkg_dir}/bin/${bin_name}"
            fi
            chmod +x "${pkg_dir}/bin/${bin_name}" 2>/dev/null || true

            # stamp version into package.json
            tmp=$(mktemp)
            jq --arg v "$version" '.version = $v' "${pkg_dir}/package.json" > "$tmp"
            mv "$tmp" "${pkg_dir}/package.json"

            npm publish "${pkg_dir}" --access public
          }

          publish_platform darwin  arm64 cli-darwin-arm64 agora     tar.gz
          publish_platform darwin  amd64 cli-darwin-x64   agora     tar.gz
          publish_platform linux   arm64 cli-linux-arm64  agora     tar.gz
          publish_platform linux   amd64 cli-linux-x64    agora     tar.gz
          publish_platform windows amd64 cli-win32-x64    agora.exe zip
          publish_platform windows arm64 cli-win32-arm64  agora.exe zip

      - name: Publish wrapper package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          pkg_dir="packaging/npm/agoraio-cli"

          # stamp version into package.json and pin optionalDependencies to exact version
          tmp=$(mktemp)
          jq --arg v "$version" '
            .version = $v |
            .optionalDependencies |= with_entries(.value = $v)
          ' "${pkg_dir}/package.json" > "$tmp"
          mv "$tmp" "${pkg_dir}/package.json"

          npm publish "${pkg_dir}" --access public
